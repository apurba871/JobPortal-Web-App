<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Login HotDev Jobs</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/font-awesome.min.css}" />
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}" />
    <meta charset="ISO-8859-1">
</head>

<body class="background">
    <nav class="main_div">
        <div class="logo_left">
            <label class="logo">
                hotdevjobs
            </label>
            <label class="logo_com">
                .com
            </label>
        </div>
        <div class="logo_right">
            <label class="Candidate_login_btn">
                <a th:href="@{/login}">
                    Candidate Login
                </a>
                <a th:href="@{/register}">
                    / Register
                </a>
            </label>
            <label class="Recruiter_login_btn">
                <a th:href="@{/login}">
                    Recruiter Login
                </a>
                <a th:href="@{/register}">
                    / Register
                </a>

            </label>
        </div>
    </nav>
    <form th:action="@{/global-search/}">
        <div class="dynamic-text-container">
            <span class="dynamic-text">Search for your dream job!</span>
            <span class="dynamic-text">Your dream job? A click away!</span>
            <span class="dynamic-text">Discover new career opportunities!</span>
        </div>
        <div class="searchBox">
            <div class="inner">

                <input type="text" placeholder="Search for a job" name="job" th:value="${job}" />
                <input type="text" placeholder="Enter a location" name="location" th:value="${location}" />
                <button type="submit"><span>Search</span></button>

            </div>
        </div>
    </form>
    <footer>
        <label class="copy-right">Copyright © Apurba Debnath</label>
    </footer>
</body>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</html>
